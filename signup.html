<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center"
      style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
             url('{{ url_for('static', filename='images/bg-heart-signup.jpg') }}')
             no-repeat center center fixed;
             background-size: cover;">

    <form method="POST" class="bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-96">
        <h1 class="text-3xl font-bold text-center mb-6 text-red-600 drop-shadow-lg">Create Account</h1>

        <input name="username" type="text" placeholder="Username" required 
               class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400">

        <input name="password" type="password" placeholder="Password" required 
               class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-400">

        <button type="submit" 
                class="w-full bg-gradient-to-r from-red-600 to-red-500 text-white py-3 rounded-lg hover:from-red-500 hover:to-red-400 transform hover:scale-105 transition-all shadow-lg">
            Signup
        </button>

        <p class="text-center mt-4 text-sm text-gray-700">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-red-600 hover:underline font-semibold">Login</a>
        </p>
    </form>
</body>
</html>
